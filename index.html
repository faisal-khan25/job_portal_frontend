<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="google-site-verification" content="f12dc6da1e4e0066"/>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== Primary SEO ===== -->
    <title>HireX – Find Your Dream Job | Top Jobs in India</title>
    <meta name="description" content="HireX connects 2 lakh+ job seekers with 10,000+ recruiters across India. Browse 50,000+ live jobs in Software, Data, Finance, Design and more. Apply in one click." />
    <meta name="keywords" content="jobs in India, job portal, find jobs, job search, software developer jobs, data analyst jobs, IT jobs, fresher jobs, hiring, recruitment, apply online" />
    <meta name="author" content="HireX" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hirex.com/" />

    <!-- ===== Open Graph (Facebook / LinkedIn) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hirex.com/" />
    <meta property="og:site_name" content="HireX" />
    <meta property="og:title" content="HireX – Find Your Dream Job | Top Jobs in India" />
    <meta property="og:description" content="HireX connects 2 lakh+ job seekers with 10,000+ recruiters. Browse 50,000+ live jobs and apply in one click." />
    <meta property="og:image" content="https://hirex.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@HireX" />
    <meta name="twitter:title" content="HireX – Find Your Dream Job | Top Jobs in India" />
    <meta name="twitter:description" content="Browse 50,000+ live jobs and connect with top recruiters on HireX. One-click apply, real-time tracking." />
    <meta name="twitter:image" content="https://hirex.com/og-image.png" />

    <!-- ===== Structured Data (JSON-LD) ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "HireX",
      "url": "https://hirex.com",
      "description": "HireX is India's leading job portal connecting job seekers with top recruiters across all industries.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://hirex.com/jobs?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "HireX",
      "url": "https://hirex.com",
      "logo": "https://hirex.com/logo.png",
      "sameAs": [
        "https://twitter.com/HireX",
        "https://www.linkedin.com/company/hirex"
      ]
    }
    </script>

    <!-- ===== Favicon ===== -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ===== Fonts / Performance ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />

    <!-- Sitemap hint for crawlers -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
