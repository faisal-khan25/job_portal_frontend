<!DOCTYPE html>
<html lang="en">
  <head>

    <!-- Google Verification -->
    <meta
      name="google-site-verification"
      content="f12dc6da1e4e0066"
    />

    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- ===== Primary SEO ===== -->

    <title>
      HireX – Find Your Dream Job | Top Jobs in India
    </title>

    <meta
      name="description"
      content="HireX connects job seekers with recruiters across India. Browse live jobs in Software, Data, Finance, Design and more."
    />

    <meta
      name="keywords"
      content="jobs in India, job portal, software jobs, IT jobs, fresher jobs, hiring, recruitment"
    />

    <meta
      name="author"
      content="HireX"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <!-- Canonical URL -->

    <link
      rel="canonical"
      href="https://job-portal-frontend-avtp.onrender.com/"
    />

    <!-- ===== Open Graph ===== -->

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:url"
      content="https://job-portal-frontend-avtp.onrender.com/"
    />

    <meta
      property="og:site_name"
      content="HireX"
    />

    <meta
      property="og:title"
      content="HireX – Find Your Dream Job"
    />

    <meta
      property="og:description"
      content="Browse live jobs and connect with top recruiters."
    />

    <meta
      property="og:image"
      content="https://job-portal-frontend-avtp.onrender.com/og-image.png"
    />

    <!-- ===== Twitter Card ===== -->

    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="HireX – Find Your Dream Job"
    />

    <meta
      name="twitter:description"
      content="Browse live jobs and connect with top recruiters."
    />

    <meta
      name="twitter:image"
      content="https://job-portal-frontend-avtp.onrender.com/og-image.png"
    />

    <!-- ===== Structured Data ===== -->

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "HireX",
        "url": "https://job-portal-frontend-avtp.onrender.com",
        "description": "HireX is a job portal connecting job seekers with recruiters.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://job-portal-frontend-avtp.onrender.com/jobs?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ===== Favicon ===== -->

    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />

    <!-- ===== Sitemap ===== -->

    <link
      rel="sitemap"
      type="application/xml"
      title="Sitemap"
      href="/sitemap.xml"
    />

  </head>

  <body>

    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>

  </body>
</html>
